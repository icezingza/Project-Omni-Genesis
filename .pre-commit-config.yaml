# ============================================
# Pre-commit Hooks Configuration
# ============================================
# Install: pip install pre-commit
# Setup: pre-commit install
# Run all: pre-commit run --all-files
# ============================================

repos:
  # ============================================
  # General Hooks
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(frontend/|\.snapshots/)
      - id: end-of-file-fixer
        exclude: ^(frontend/|\.snapshots/)
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
      - id: check-json
      - id: check-toml

  # ============================================
  # Python - Black Formatter
  # ============================================
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=100]
        files: ^backend/
        exclude: ^backend/__pycache__/

  # ============================================
  # Python - Import Sorting
  # ============================================
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]
        files: ^backend/

  # ============================================
  # Python - Flake8 Linter
  # ============================================
  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args: ['--max-line-length=100', '--extend-ignore=E203,W503,D100,D104,D107']
        files: ^backend/
        additional_dependencies:
          - flake8-docstrings
          - flake8-bugbear

  # ============================================
  # Python - Type Checking
  # ============================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        files: ^backend/
        additional_dependencies:
          - types-requests
          - types-python-jose
          - pydantic>=2.0.0
          - sqlalchemy>=2.0.0

  # ============================================
  # Python - Security
  # ============================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        files: ^backend/

  # ============================================
  # TypeScript/JavaScript - ESLint & Prettier
  # ============================================
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: ^frontend/.*\.(ts|tsx)$
        additional_dependencies:
          - eslint@8.56.0
          - '@typescript-eslint/eslint-plugin@6.15.0'
          - '@typescript-eslint/parser@6.15.0'
          - eslint-plugin-react@7.33.2
          - eslint-plugin-react-hooks@4.6.0

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, css, markdown]
        files: ^frontend/

  # ============================================
  # Docker (requires hadolint binary - uncomment when installed)
  # ============================================
  # - repo: https://github.com/hadolint/hadolint
  #   rev: v2.12.0
  #   hooks:
  #     - id: hadolint
  #       files: Dockerfile.*

  # ============================================
  # Git
  # ============================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
